<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>English Master · Premium Test Prep</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    /* Same base styles as your HSK index, but with teal accent */
    :root {
      --bg-card: #ffffff;
      --text-primary: #1b4b3e;
      --text-secondary: #0d9488;
      --border-light: #a7f3d0;
      --accent: #0d9488;
      --accent-hover: #0f766e;
    }
    body {
      background: linear-gradient(145deg, #ecfdf5 0%, #d1fae5 100%);
      font-family: 'Inter', sans-serif;
      min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem;
    }
    .container {
      max-width: 1100px; background: rgba(255,255,255,0.7); backdrop-filter: blur(16px);
      border-radius: 3rem; padding: 3rem 2rem; box-shadow: 0 30px 50px rgba(0,0,0,0.1);
    }
    h1 {
      font-size: 3rem; background: linear-gradient(135deg, #064e3b, #0d9488);
      -webkit-background-clip: text; color: transparent;
    }
    .card-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(200px,1fr)); gap: 1.5rem; margin: 2rem 0;
    }
    .card {
      background: white; border-radius: 2rem; padding: 2rem 1rem; cursor: pointer;
      border: 1px solid #a7f3d0; transition: 0.2s; box-shadow: 0 8px 18px rgba(0,0,0,0.04);
    }
    .card:hover { transform: translateY(-6px); border-color: var(--accent); }
    .card h2 { font-size: 2rem; color: var(--text-primary); }
    .lock-icon { color: #e76f51; margin-top: 0.5rem; }
  </style>
</head>
<body>
<div class="container">
  <h1>🇬🇧 English Master · Premium</h1>
  <p style="color: #0d9488;">One payment, forever access – CET‑4, CET‑6, and Postgrad English</p>

  <div class="card-grid">
    <div class="card" data-level="cet4" data-hub="cet4_hub.html">
      <h2>CET‑4</h2>
      <p>大学英语四级 · 4500 words</p>
      <div class="lock-icon"><i class="fas fa-lock"></i></div>
    </div>
    <div class="card" data-level="cet6" data-hub="cet6_hub.html">
      <h2>CET‑6</h2>
      <p>大学英语六级 · 5500 words</p>
      <div class="lock-icon"><i class="fas fa-lock"></i></div>
    </div>
    <div class="card" data-level="kaoyan" data-hub="kaoyan_hub.html">
      <h2>考研英语</h2>
      <p>Postgraduate Entrance · 5500+ words</p>
      <div class="lock-icon"><i class="fas fa-lock"></i></div>
    </div>
  </div>

  <!-- Contact container filled by premium.js -->
  <div id="premium-contact-container"></div>

  <p style="margin-top:2rem; font-size:0.9rem;">🔒 One‑time code system – each code works once. Contact me to reset.</p>
</div>

<script>
  (function() {
    // same level card logic as before: check premium, redirect or show modal
    const PREMIUM_KEY = "hsk_premium_active";
    document.querySelectorAll(".card").forEach(card => {
      card.addEventListener("click", () => {
        if (localStorage.getItem(PREMIUM_KEY) === "true") {
          window.location.href = card.dataset.hub;
        } else {
          document.getElementById("unlockModal").style.display = "flex";
          document.getElementById("modalLevelTitle").textContent = card.querySelector("h2").textContent + " Access";
        }
      });
    });
  })();
</script>

<!-- Modal (same as before, omitted for brevity but must be present) -->
<!-- Premium system script -->
<script src="premium.js"></script>
</body>
</html>
