<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>CET‑4 Phrases Master</title>
  <!-- Cache control -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui, sans-serif; transition: background 0.2s, color 0.2s, border-color 0.2s; }
    body.light {
      background: linear-gradient(145deg, #ecfdf5 0%, #d1fae5 100%);
      --bg-card: #ffffff;
      --bg-header: rgba(255,255,255,0.7);
      --text-primary: #064e3b;
      --text-secondary: #0d9488;
      --border-light: #a7f3d0;
      --shadow: 0 20px 40px rgba(0,0,0,0.05);
      --accent: #0d9488;
      --accent-hover: #0f766e;
    }
    body.dark {
      background: linear-gradient(145deg, #0a1e1c 0%, #061210 100%);
      --bg-card: #1e3a38;
      --bg-header: rgba(30,45,45,0.8);
      --text-primary: #d1fae5;
      --text-secondary: #6ee7b7;
      --border-light: #2e5a56;
      --shadow: 0 20px 40px rgba(0,0,0,0.3);
      --accent: #34d399;
      --accent-hover: #10b981;
    }
    body { padding: 1.2rem; display: flex; flex-direction: column; align-items: center; background: var(--bg-header); }
    .app-container {
      max-width: 1400px;
      width: 100%;
      background: var(--bg-header);
      backdrop-filter: blur(12px);
      border-radius: 2rem;
      padding: 1.5rem;
      box-shadow: var(--shadow);
      border: 1px solid rgba(255,255,255,0.2);
      margin-bottom: 4.5rem;
    }
    .header { display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; gap: 1rem; }
    .title-section { display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; }
    .title-section h1 {
      font-size: 2.2rem;
      background: linear-gradient(135deg, var(--text-secondary), var(--accent));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .badge { background: var(--accent); color: white; padding: 0.3rem 1rem; border-radius: 40px; font-size: 0.85rem; font-weight: 500; }
    .search-box {
      display: flex; background: var(--bg-card); border-radius: 50px; padding: 0.2rem 0.2rem 0.2rem 1.2rem;
      border: 1px solid var(--border-light); min-width: 250px;
    }
    .search-box input {
      flex: 1; border: none; outline: none; font-size: 1rem; padding: 0.6rem 0;
      background: transparent; color: var(--text-primary);
    }
    .search-box input::placeholder { color: var(--text-secondary); opacity: 0.7; }
    .search-box button {
      background: var(--accent); border: none; color: white; padding: 0.5rem 1.2rem;
      border-radius: 40px; cursor: pointer; font-weight: 600;
    }
    .search-box button:hover { background: var(--accent-hover); }
    .settings-bar { display: flex; justify-content: flex-end; gap: 1rem; margin-bottom: 1rem; flex-wrap: wrap; }
    .icon-btn {
      background: var(--bg-card); border: 1px solid var(--border-light); border-radius: 30px; padding: 0.4rem 0.8rem;
      cursor: pointer; color: var(--text-primary); font-size: 0.9rem; display: flex; align-items: center; gap: 4px;
    }
    .icon-btn i { font-size: 0.9rem; color: var(--accent); }
    .stats-panel {
      background: var(--bg-card); border-radius: 1.5rem; padding: 0.8rem 1rem; margin-bottom: 1rem;
      display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; gap: 0.8rem;
      border: 1px solid var(--border-light);
    }
    .stats-panel.hidden { display: none; }
    .stats-panel .stat { font-weight: 500; color: var(--text-primary); }
    .letter-filter { display: flex; flex-wrap: wrap; gap: 0.4rem; margin: 1rem 0 0.5rem; justify-content: center; }
    .letter-btn {
      background: var(--bg-card); border: 1px solid var(--border-light); width: 36px; height: 36px;
      border-radius: 20px; font-weight: 600; color: var(--text-secondary); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .letter-btn.active { background: var(--accent); color: white; }
    .categories { display: flex; flex-wrap: wrap; gap: 0.5rem; margin: 1rem 0; }
    .cat-btn {
      background: var(--bg-card); border: 1px solid var(--border-light); padding: 0.4rem 1rem;
      border-radius: 30px; font-weight: 500; color: var(--text-secondary); cursor: pointer; font-size: 0.85rem;
    }
    .cat-btn.active { background: var(--accent); color: white; }
    .stats-bar { display: flex; justify-content: space-between; align-items: center; margin: 1rem 0 1.2rem; flex-wrap: wrap; gap: 0.5rem; }
    .word-counter { background: var(--bg-card); padding: 0.3rem 1rem; border-radius: 40px; font-size: 0.9rem; font-weight: 500; color: var(--text-primary); }
    .pagination-controls { display: flex; gap: 0.4rem; flex-wrap: wrap; }
    .page-btn {
      width: 34px; height: 34px; border-radius: 17px; border: none; background: var(--bg-card);
      font-weight: 600; color: var(--text-secondary); cursor: pointer; border: 1px solid var(--border-light);
    }
    .page-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
    .bottom-pagination { margin-top: 1rem; display: flex; justify-content: center; align-items: center; gap: 1rem; }
    .bottom-pagination button {
      background: var(--bg-card); border: 1px solid var(--border-light); padding: 0.5rem 1rem;
      border-radius: 30px; cursor: pointer; color: var(--text-primary);
    }
    .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1rem; margin: 1rem 0; }
    .phrase-card {
      background: var(--bg-card); border-radius: 1.5rem; padding: 1.2rem 1rem;
      border: 1px solid var(--border-light); transition: 0.2s;
    }
    .phrase-card:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.08); }
    .phrase-header { display: flex; align-items: center; justify-content: space-between; }
    .phrase-text { font-size: 1.5rem; font-weight: 600; color: var(--text-primary); cursor: pointer; }
    .favorite-btn { background: none; border: none; font-size: 1.5rem; cursor: pointer; color: #cbd5e0; }
    .favorite-btn.active { color: #e53e3e; }
    .speaker-btn {
      background: rgba(13,148,136,0.1); border: none; width: 40px; height: 40px;
      border-radius: 50%; cursor: pointer; color: var(--text-secondary); font-size: 1.2rem; margin-left: 0.5rem;
    }
    .meaning { font-size: 0.9rem; background: rgba(13,148,136,0.05); padding: 0.4rem 0.8rem; border-radius: 1rem; border: 1px dashed var(--border-light); color: var(--text-primary); margin: 0.6rem 0; }
    .example-container {
      margin-top: 0.6rem; display: flex; align-items: flex-start; gap: 8px;
      background: rgba(13,148,136,0.05); border-radius: 1rem; padding: 0.4rem 0.8rem;
      border-left: 3px solid var(--accent);
    }
    .example-text { font-size: 0.85rem; font-style: italic; flex: 1; color: var(--text-primary); }
    .example-speaker { background: none; border: none; color: var(--text-secondary); font-size: 1rem; cursor: pointer; }
    .study-mode-badge {
      background: var(--accent); color: white; border: none; border-radius: 30px; padding: 0.3rem 1rem;
      margin-left: 1rem; font-size: 0.8rem; cursor: pointer;
    }
    .study-mode-active .meaning, .study-mode-active .example-container { display: none !important; }
    .footer-note { text-align: center; font-size: 0.75rem; color: var(--text-secondary); margin-top: 1rem; }
    .hidden { display: none; }
    @media (max-width: 640px) {
      .app-container { padding: 1rem; }
      .phrase-text { font-size: 1.3rem; }
      .title-section h1 { font-size: 1.6rem; }
      .letter-btn { width: 32px; height: 32px; font-size: 0.8rem; }
    }
  </style>
  <!-- Premium Gatekeeper -->
  <script src="premium-check.js"></script>
</head>
<body class="light">
<div class="app-container">
  <div class="header">
    <div class="title-section">
      <h1>📄 CET‑4 Phrases Master</h1>
      <div class="badge"><i class="fas fa-language"></i> 1000+ phrases</div>
      <button id="studyModeToggle" class="study-mode-badge"><i class="fas fa-eye-slash"></i> Study Mode</button>
    </div>
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="🔍 Search phrase or meaning">
      <button id="searchBtn">Search</button>
    </div>
  </div>

  <div class="settings-bar">
    <button id="darkModeToggle" class="icon-btn"><i class="fas fa-moon"></i> Dark Mode</button>
    <button id="toggleStatsBtn" class="icon-btn"><i class="fas fa-chart-line"></i> Show Stats</button>
    <button id="exportFavBtn" class="icon-btn"><i class="fas fa-download"></i> Export Favorites</button>
    <button id="importFavBtn" class="icon-btn"><i class="fas fa-upload"></i> Import Favorites</button>
    <input type="file" id="importFavFile" style="display:none" accept=".json">
  </div>

  <div id="statsPanel" class="stats-panel hidden">
    <div class="stat"><i class="fas fa-heart"></i> Favorites: <span id="favCount">0</span></div>
    <div class="stat"><i class="fas fa-eye"></i> Studied: <span id="studiedCount">0</span> / <span id="totalPhrasesStat">0</span></div>
    <div class="stat"><i class="fas fa-check-circle"></i> Mastery: <span id="masteryPercent">0</span>%</div>
    <button id="resetProgressBtn" class="icon-btn" style="font-size:0.8rem;"><i class="fas fa-trash-alt"></i> Reset Progress</button>
  </div>

  <div class="letter-filter" id="letterFilter"></div>
  <div class="categories" id="categoryTabs">
    <button class="cat-btn active" data-cat="all">All Phrases</button>
    <button class="cat-btn" data-cat="favorites"><i class="fas fa-heart"></i> Favorites</button>
  </div>

  <div class="stats-bar">
    <div class="word-counter">📄 Showing <span id="shownCount">0</span> / <span id="totalCount">0</span> phrases</div>
    <div class="pagination-controls" id="paginationContainer"></div>
  </div>

  <div id="vocabGrid" class="card-grid"></div>

  <div class="bottom-pagination" id="bottomPagination">
    <button id="prevPageBottom"><i class="fas fa-chevron-left"></i> Previous</button>
    <span id="pageInfo">Page 1 / 1</span>
    <button id="nextPageBottom">Next <i class="fas fa-chevron-right"></i></button>
  </div>

  <!-- Premium Contact Container -->
  <div id="premium-contact-container"></div>

  <div class="footer-note">
    <span><i class="fas fa-heart"></i> Favorite</span>
    <span><i class="fas fa-volume-up"></i> Click to hear phrase</span>
    <span><i class="fas fa-eye-slash"></i> Study Mode</span>
  </div>
</div>

<!-- Premium System -->
<script src="premium.js"></script>

<!-- Phrases data -->
<script src="words_cet4_phrases.js"></script>

<script>
  (function() {
    // TTS
    if (!window.speechSynthesis) {
      window.speakText = function(t) { console.log(t); };
    } else {
      window.speakText = function(text) {
        if (!text) return;
        try {
          window.speechSynthesis.cancel();
          const u = new SpeechSynthesisUtterance(text);
          u.lang = 'en-US';
          u.rate = 0.9;
          window.speechSynthesis.speak(u);
        } catch(e) { console.error(e); }
      };
    }

    const phraseList = window.CET4_PHRASES || [];
    if (phraseList.length === 0) alert('words_cet4_phrases.js missing');

    let currentFilter = 'all', currentLetter = null, filteredPhrases = [...phraseList], currentPage = 1, pageSize = 20;
    let favorites = new Set(JSON.parse(localStorage.getItem('cet4_phrase_favorites') || '[]'));
    let studiedPhrases = new Set(JSON.parse(localStorage.getItem('cet4_phrase_studied') || '[]'));
    let studyMode = localStorage.getItem('cet4_phrase_studyMode') === 'true';

    const grid = document.getElementById('vocabGrid'),
          searchInput = document.getElementById('searchInput'),
          searchBtn = document.getElementById('searchBtn');
    const shownSpan = document.getElementById('shownCount'),
          totalSpan = document.getElementById('totalCount'),
          paginationDiv = document.getElementById('paginationContainer');
    const bottomPrev = document.getElementById('prevPageBottom'),
          bottomNext = document.getElementById('nextPageBottom'),
          pageInfoSpan = document.getElementById('pageInfo');
    const categoryBtns = document.querySelectorAll('.cat-btn'),
          favCountSpan = document.getElementById('favCount'),
          studiedCountSpan = document.getElementById('studiedCount'),
          totalPhrasesStatSpan = document.getElementById('totalPhrasesStat'),
          masteryPercentSpan = document.getElementById('masteryPercent'),
          statsPanel = document.getElementById('statsPanel');
    const toggleStatsBtn = document.getElementById('toggleStatsBtn'),
          exportFavBtn = document.getElementById('exportFavBtn'),
          importFavBtn = document.getElementById('importFavBtn'),
          importFavFile = document.getElementById('importFavFile'),
          resetProgressBtn = document.getElementById('resetProgressBtn'),
          darkModeToggle = document.getElementById('darkModeToggle');
    const letterFilterDiv = document.getElementById('letterFilter'),
          studyModeToggle = document.getElementById('studyModeToggle');

    function updateStats() {
      favCountSpan.innerText = favorites.size;
      studiedCountSpan.innerText = studiedPhrases.size;
      totalPhrasesStatSpan.innerText = phraseList.length;
      masteryPercentSpan.innerText = phraseList.length ? Math.round((studiedPhrases.size / phraseList.length) * 100) : 0;
    }

    function markPhrasesStudied(phrases) {
      let changed = false;
      phrases.forEach(p => {
        if (!studiedPhrases.has(p.phrase)) {
          studiedPhrases.add(p.phrase);
          changed = true;
        }
      });
      if (changed) {
        localStorage.setItem('cet4_phrase_studied', JSON.stringify([...studiedPhrases]));
        updateStats();
      }
    }

    function applyFilter() {
      const searchTerm = searchInput.value.trim().toLowerCase();
      let base = phraseList;
      if (currentFilter === 'favorites') {
        base = phraseList.filter(p => favorites.has(p.phrase));
      }
      if (currentLetter) {
        base = base.filter(p => p.phrase.toLowerCase().charAt(0) === currentLetter);
      }
      filteredPhrases = searchTerm ? base.filter(p =>
        p.phrase.toLowerCase().includes(searchTerm) ||
        p.meaning.toLowerCase().includes(searchTerm)
      ) : [...base];
      currentPage = 1;
    }

    function saveFavorites() {
      localStorage.setItem('cet4_phrase_favorites', JSON.stringify([...favorites]));
      updateStats();
    }

    function toggleFavorite(phrase) {
      if (favorites.has(phrase)) favorites.delete(phrase);
      else favorites.add(phrase);
      saveFavorites();
      if (currentFilter === 'favorites') { applyFilter(); render(); }
    }

    function render() {
      const pagePhrases = filteredPhrases.slice((currentPage-1)*pageSize, currentPage*pageSize);
      if (pagePhrases.length === 0) {
        grid.innerHTML = '<div class="empty-state" style="text-align:center; padding:2rem; color:var(--text-secondary);">✨ No phrases found</div>';
      } else {
        let html = '';
        pagePhrases.forEach(item => {
          const isFav = favorites.has(item.phrase);
          const exampleHtml = item.example ? `<div class="example-container"><span class="example-text">📌 ${item.example}</span><button class="example-speaker" data-example="${item.example}"><i class="fas fa-volume-up"></i></button></div>` : '';
          html += `<div class="phrase-card">
            <div class="phrase-header">
              <span class="phrase-text">${item.phrase}</span>
              <div>
                <button class="favorite-btn ${isFav ? 'active' : ''}" data-phrase="${item.phrase}">
                  <i class="${isFav ? 'fas' : 'far'} fa-heart"></i>
                </button>
                <button class="speaker-btn" data-phrase="${item.phrase}">
                  <i class="fas fa-volume-up"></i>
                </button>
              </div>
            </div>
            <div class="meaning">${item.meaning}</div>
            ${exampleHtml}
          </div>`;
        });
        grid.innerHTML = html;
        markPhrasesStudied(pagePhrases);
      }
      document.querySelectorAll('.speaker-btn').forEach(btn => {
        btn.addEventListener('click', () => window.speakText(btn.dataset.phrase));
      });
      document.querySelectorAll('.example-speaker').forEach(btn => {
        btn.addEventListener('click', () => window.speakText(btn.dataset.example));
      });
      document.querySelectorAll('.favorite-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          toggleFavorite(btn.dataset.phrase);
          const icon = btn.querySelector('i');
          if (favorites.has(btn.dataset.phrase)) {
            icon.classList.remove('far'); icon.classList.add('fas'); btn.classList.add('active');
          } else {
            icon.classList.remove('fas'); icon.classList.add('far'); btn.classList.remove('active');
          }
        });
      });
      shownSpan.innerText = filteredPhrases.length;
      totalSpan.innerText = phraseList.length;
      renderPagination();
      if (studyMode) document.body.classList.add('study-mode-active');
      else document.body.classList.remove('study-mode-active');
    }

    function renderPagination() {
      const totalPages = Math.ceil(filteredPhrases.length / pageSize);
      if (totalPages <= 1) {
        paginationDiv.innerHTML = '';
        bottomPrev.disabled = true;
        bottomNext.disabled = true;
        pageInfoSpan.innerText = 'Page 1 / 1';
      } else {
        let btns = `<button class="page-btn" id="prevPageTop" ${currentPage===1?'disabled':''}><i class="fas fa-chevron-left"></i></button>`;
        for (let i=1; i<=totalPages; i++) {
          btns += `<button class="page-btn ${i===currentPage ? 'active' : ''}" data-page="${i}">${i}</button>`;
        }
        btns += `<button class="page-btn" id="nextPageTop" ${currentPage===totalPages?'disabled':''}><i class="fas fa-chevron-right"></i></button>`;
        paginationDiv.innerHTML = btns;
        document.querySelectorAll('.page-btn[data-page]').forEach(btn => {
          btn.addEventListener('click', () => { currentPage = parseInt(btn.dataset.page); render(); });
        });
        document.getElementById('prevPageTop')?.addEventListener('click', () => {
          if (currentPage > 1) { currentPage--; render(); }
        });
        document.getElementById('nextPageTop')?.addEventListener('click', () => {
          if (currentPage < totalPages) { currentPage++; render(); }
        });
        bottomPrev.disabled = (currentPage === 1);
        bottomNext.disabled = (currentPage === totalPages);
        pageInfoSpan.innerText = `Page ${currentPage} / ${totalPages}`;
      }
    }

    function buildLetterFilter() {
      const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
      letterFilterDiv.innerHTML = '<button class="letter-btn all-letters active" data-letter="">All</button>';
      letters.forEach(l => {
        const btn = document.createElement('button');
        btn.className = 'letter-btn';
        btn.textContent = l;
        btn.dataset.letter = l.toLowerCase();
        btn.addEventListener('click', () => {
          document.querySelectorAll('.letter-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          currentLetter = l.toLowerCase();
          applyFilter();
          render();
        });
        letterFilterDiv.appendChild(btn);
      });
      const allBtn = document.querySelector('.letter-btn.all-letters');
      if (allBtn) {
        allBtn.addEventListener('click', () => {
          document.querySelectorAll('.letter-btn').forEach(b => b.classList.remove('active'));
          allBtn.classList.add('active');
          currentLetter = null;
          applyFilter();
          render();
        });
      }
    }

    categoryBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        categoryBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.cat;
        applyFilter();
        render();
      });
    });

    function handleSearch() { applyFilter(); render(); }
    searchBtn.addEventListener('click', handleSearch);
    searchInput.addEventListener('keyup', e => e.key === 'Enter' && handleSearch());

    bottomPrev.addEventListener('click', () => {
      if (currentPage > 1) { currentPage--; render(); }
    });
    bottomNext.addEventListener('click', () => {
      if (currentPage < Math.ceil(filteredPhrases.length / pageSize)) { currentPage++; render(); }
    });

    toggleStatsBtn.addEventListener('click', () => {
      statsPanel.classList.toggle('hidden');
      localStorage.setItem('cet4_phrase_stats_visible', (!statsPanel.classList.contains('hidden')).toString());
    });
    if (localStorage.getItem('cet4_phrase_stats_visible') === 'true') statsPanel.classList.remove('hidden');
    else statsPanel.classList.add('hidden');

    darkModeToggle.addEventListener('click', () => {
      const isDark = document.body.classList.contains('dark');
      if (isDark) {
        document.body.classList.remove('dark');
        document.body.classList.add('light');
        localStorage.setItem('cet4_phrase_theme', 'light');
        darkModeToggle.innerHTML = '<i class="fas fa-moon"></i> Dark Mode';
      } else {
        document.body.classList.remove('light');
        document.body.classList.add('dark');
        localStorage.setItem('cet4_phrase_theme', 'dark');
        darkModeToggle.innerHTML = '<i class="fas fa-sun"></i> Light Mode';
      }
    });

    exportFavBtn.addEventListener('click', () => {
      const data = JSON.stringify([...favorites], null, 2);
      const blob = new Blob([data], {type:'application/json'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = 'cet4_phrase_favorites.json'; a.click();
      URL.revokeObjectURL(url);
    });

    importFavBtn.addEventListener('click', () => importFavFile.click());
    importFavFile.addEventListener('change', e => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        try {
          const imported = JSON.parse(ev.target.result);
          if (Array.isArray(imported)) {
            favorites = new Set(imported);
            saveFavorites();
            if (currentFilter === 'favorites') { applyFilter(); render(); }
            else render();
            updateStats();
            alert('Favorites imported!');
          } else alert('Invalid file');
        } catch(err) { alert('Parse error'); }
        importFavFile.value = '';
      };
      reader.readAsText(file);
    });

    resetProgressBtn.addEventListener('click', () => {
      if (confirm('Reset all progress?')) {
        studiedPhrases.clear();
        localStorage.setItem('cet4_phrase_studied', JSON.stringify([]));
        updateStats();
        alert('Progress reset');
      }
    });

    studyModeToggle.addEventListener('click', () => {
      studyMode = !studyMode;
      localStorage.setItem('cet4_phrase_studyMode', studyMode);
      if (studyMode) document.body.classList.add('study-mode-active');
      else document.body.classList.remove('study-mode-active');
    });

    // Init
    const savedTheme = localStorage.getItem('cet4_phrase_theme');
    if (savedTheme === 'dark') {
      document.body.classList.add('dark');
      document.body.classList.remove('light');
      darkModeToggle.innerHTML = '<i class="fas fa-sun"></i> Light Mode';
    } else {
      document.body.classList.add('light');
      document.body.classList.remove('dark');
      darkModeToggle.innerHTML = '<i class="fas fa-moon"></i> Dark Mode';
    }
    if (localStorage.getItem('cet4_phrase_studyMode') === 'true') {
      studyMode = true;
      document.body.classList.add('study-mode-active');
    }
    buildLetterFilter();
    applyFilter();
    render();
    updateStats();
  })();
</script>
