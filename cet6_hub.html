<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CET‑6 · 学习中心</title>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
    body {
      background: linear-gradient(145deg, #ecfdf5 0%, #d1fae5 100%);
      min-height: 100vh;
      padding: 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    body.dark {
      background: linear-gradient(145deg, #0a1e1c 0%, #061210 100%);
    }
    .container {
      max-width: 1300px;
      width: 100%;
      background: rgba(255,255,255,0.7);
      backdrop-filter: blur(16px);
      border-radius: 3rem;
      padding: 2.5rem 2rem;
      text-align: center;
      box-shadow: 0 25px 45px rgba(0,0,0,0.08);
      border: 1px solid rgba(255,255,255,0.5);
    }
    body.dark .container {
      background: rgba(30,45,45,0.8);
      border-color: #334155;
    }
    h1 {
      font-size: 2.8rem;
      background: linear-gradient(135deg, #064e3b, #0d9488);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .badge-level {
      background: #0d9488;
      color: white;
      font-size: 1rem;
      padding: 0.2rem 1rem;
      border-radius: 40px;
    }
    .sub {
      color: #0d9488;
      margin-bottom: 2rem;
      font-size: 1.1rem;
      border-bottom: 1px dashed #a7f3d0;
      padding-bottom: 1rem;
    }
    body.dark .sub { color: #6ee7b7; border-color: #2e5a56; }
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 1.2rem;
      margin: 2rem 0 1.5rem;
    }
    .card {
      background: white;
      border-radius: 1.5rem;
      padding: 1.5rem 1rem;
      text-decoration: none;
      color: #064e3b;
      box-shadow: 0 8px 18px rgba(0,0,0,0.04);
      transition: all 0.2s;
      border: 1px solid #a7f3d0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    body.dark .card {
      background: #1e3a38;
      border-color: #2e5a56;
      color: #d1fae5;
    }
    .card:hover {
      transform: translateY(-6px);
      box-shadow: 0 18px 30px rgba(13,148,136,0.2);
      border-color: #0d9488;
    }
    .card i {
      font-size: 2.2rem;
      color: #0d9488;
      margin-bottom: 0.7rem;
    }
    .card h2 {
      font-size: 1.25rem;
      margin-bottom: 0.4rem;
      font-weight: 600;
    }
    .card p {
      font-size: 0.75rem;
      color: #6c8ea0;
      line-height: 1.3;
    }
    body.dark .card p { color: #9ab8b0; }

    .exam-section {
      margin-top: 1rem;
      background: rgba(13,148,136,0.03);
      border-radius: 1.8rem;
      padding: 1.5rem 1rem;
      border: 1px solid #a7f3d0;
    }
    body.dark .exam-section { background: rgba(255,255,255,0.03); border-color: #2e5a56; }
    .exam-title {
      font-weight: 600;
      color: #064e3b;
      margin-bottom: 1.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }
    body.dark .exam-title { color: #d1fae5; }
    .exam-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 0.8rem;
      justify-content: center;
    }
    .exam-btn {
      background: white;
      border: 1.5px solid #0d9488;
      color: #0d9488;
      padding: 0.7rem 1.5rem;
      border-radius: 60px;
      font-weight: 600;
      text-decoration: none;
      transition: 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.03);
      font-size: 0.95rem;
    }
    body.dark .exam-btn { background: #1e3a38; color: #6ee7b7; border-color: #34d399; }
    .exam-btn:hover {
      background: #0d9488;
      color: white;
    }
    .exam-note {
      margin-top: 1.2rem;
      font-size: 0.8rem;
      color: #0d9488;
      opacity: 0.8;
    }
    .note {
      margin-top: 1.8rem;
      font-size: 0.9rem;
      color: #0d9488;
      background: rgba(255,255,255,0.6);
      padding: 0.6rem 1.5rem;
      border-radius: 40px;
      display: inline-block;
    }
    .footer-meta {
      margin-top: 1rem;
      font-size: 0.75rem;
      color: #6c8ea0;
    }
    :root {
      --bg-card: #ffffff;
      --text-primary: #064e3b;
      --text-secondary: #0d9488;
      --border-light: #a7f3d0;
      --accent: #0d9488;
    }
    body.dark {
      --bg-card: #1e3a38;
      --text-primary: #d1fae5;
      --text-secondary: #6ee7b7;
      --border-light: #2e5a56;
      --accent: #34d399;
    }
  </style>
</head>
<body class="light">
<div class="container">
  <h1>📖 CET‑6 学习中心 <span class="badge-level">5,500 词</span></h1>
  <div class="sub">选择模块 · 系统提升</div>

  <!-- 功能卡片 -->
  <div class="card-grid">
    <a class="card" href="cet6_vocab.html">

      <h2>词汇</h2>
      <p>5,500+ 词 · 发音 / 收藏 / 学习模式</p>
    </a>
    <a class="card" href="cet6_phrases.html">
      <i class="fas fa-file-alt"></i>

    <a class="card" href="cet6_grammar.html">

      <p>核心语法点 · 例句详解</p>

    <a class="card" href="cet6_exam.html">

  <!-- 考试套卷区域（如有多个） -->
  <div class="exam-section">
    <div class="exam-title">
      <i class="fas fa-file-alt" style="color:#0d9488;"></i>
      <span>📝 练习套卷</span>
    </div>
    <div class="exam-buttons">
      <a class="exam-btn" href="cet6_exam.html"><i class="fas fa-file-alt"></i> 全真模拟</a>

  <!-- 付费联系区域（由 premium.js 注入） -->
  <div id="premium-contact-container"></div>

  <div class="note">💡 所有进度自动保存 · 祝你考试顺利！</div>
  <div class="footer-meta"><i class="fas fa-database"></i> 数据仅存储在您的浏览器中</div>
</div>

<!-- 付费系统脚本 -->
<script src="premium-check.js"></script>
<script src="premium.js"></script>

<!-- 深色模式切换 -->
<script>
  (function() {
    var body = document.body;
    if (localStorage.getItem('cet6_hub_theme') === 'dark') {
      body.classList.add('dark');
      body.classList.remove('light');
    }
    var darkBtn = document.createElement('button');
    darkBtn.innerHTML = '<i class="fas fa-moon"></i>';
    darkBtn.style.cssText = 'position:fixed; bottom:20px; right:20px; background:var(--accent); color:white; border:none; border-radius:50%; width:50px; height:50px; cursor:pointer; z-index:999;';
    darkBtn.onclick = function() {
      if (body.classList.contains('light')) {
        body.classList.remove('light');
        body.classList.add('dark');
        darkBtn.innerHTML = '<i class="fas fa-sun"></i>';
        localStorage.setItem('cet6_hub_theme', 'dark');
      } else {
        body.classList.remove('dark');
        body.classList.add('light');
        darkBtn.innerHTML = '<i class="fas fa-moon"></i>';
        localStorage.setItem('cet6_hub_theme', 'light');
      }
    };
    if (body.classList.contains('dark')) darkBtn.innerHTML = '<i class="fas fa-sun"></i>';
    document.body.appendChild(darkBtn);
  })();
</script>
</body>
</html>
